<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Band 9 IELTS Engine (Full Version)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .foundation { background: #fff5f5; padding: 15px; border-left: 6px solid #e74c3c; margin-bottom: 20px; font-size: 0.95em; }
        .input-group { margin: 20px 0; padding: 15px; background: #fdfdfd; border-left: 6px solid #27ae60; position: relative; }
        .anchor-text { font-size: 1em; color: #2c3e50; font-weight: 600; background: #f1f8e9; padding: 12px; display: block; margin-bottom: 10px; border-radius: 4px; border: 1px solid #c8e6c9; line-height: 1.5; }
        textarea { width: 100%; height: 80px; border: 1px solid #bdc3c7; padding: 10px; box-sizing: border-box; font-size: 1em; }
        .b3 { color: #c0392b; font-weight: bold; } .b9 { color: #27ae60; font-weight: bold; } 
        .gram { background-color: #f1c40f; padding: 2px; border-radius: 3px; font-weight: bold; }
        .voice-btn { cursor: pointer; background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; margin-bottom: 8px; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; margin-top: 5px; font-size: 1em; }
        #review { margin-top: 25px; padding: 20px; border: 1px solid #bdc3c7; display: none; background: #f1f2f6; line-height: 1.6; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Topic 1: Hometown</h2>
    <div class="foundation"><strong>Structural Foundation (Basic):</strong> <span id="p-foundation"></span></div>
    
    <div id="drill-area">
        <div class="input-group"><label>Scene (Nominalization):</label><span class="anchor-text" id="p-sit"></span><button class="voice-btn" onclick="startDictation('sit')">🎤 Dictate Scene</button><textarea id="sit"></textarea></div>
        <div class="input-group"><label>Challenge (Complex Conjunction):</label><span class="anchor-text" id="p-task"></span><button class="voice-btn" onclick="startDictation('task')">🎤 Dictate Challenge</button><textarea id="task"></textarea></div>
        <div class="input-group"><label>Action (Past Progressive + Inversion):</label><span class="anchor-text" id="p-act"></span><button class="voice-btn" onclick="startDictation('act')">🎤 Dictate Action</button><textarea id="act"></textarea></div>
        <div class="input-group"><label>Impact (Academic Hedging):</label><span class="anchor-text" id="p-res"></span><button class="voice-btn" onclick="startDictation('res')">🎤 Dictate Impact</button><textarea id="res"></textarea></div>
    </div>
    
    <button onclick="evaluateDrill()">Submit & Generate Band 9 Audit</button>
    <button onclick="nextLevel()" style="background:#34495e;">Next Competency</button>
    <div id="review"></div>
</div>

<script>
    const topics = [
        { t: "1. Hometown", f: "My <span class='b3'>hometown</span> is <span class='b3'>growing</span> fast. I <span class='b3'>lived</span> there and <span class='b3'>saw</span> many <span class='b3'>buildings</span> being <span class='b3'>built</span>.", s: "The <span class='gram'>longitudinal urbanization</span> of my hometown reflects deep <span class='b9'>demographic shifts</span> and significant spatial transformation.", ch: "<span class='gram'>Notwithstanding</span> <span class='b9'>heritage preservation efforts</span> and local economic pressures, the city continues to expand rapidly.", a: "<span class='gram'>While I was</span> residing there, <span class='gram'>never had I witnessed</span> such <span class='b9'>accelerated developmental momentum</span> and infrastructural modernization.", r: "<span class='gram'>It would be more accurate to conclude</span> that this persistent growth fosters long-term <span class='b9'>community resilience</span> and regional <span class='b9'>prosperity</span>.", full: "The longitudinal urbanization of my hometown reflects deep demographic shifts and significant spatial transformation. Notwithstanding heritage preservation efforts and local economic pressures, the city continues to expand rapidly. While I was residing there, never had I witnessed such accelerated developmental momentum and infrastructural modernization. It would be more accurate to conclude that this persistent growth fosters long-term community resilience and regional prosperity." },
        { t: "2. Work & Career", f: "I <span class='b3'>like</span> my <span class='b3'>job</span> because I <span class='b3'>learn</span> new <span class='b3'>things</span>. It is <span class='b3'>hard</span> work, but I am <span class='b3'>good</span> at it.", s: "The <span class='gram'>professional trajectory</span> of my career emphasizes <span class='b9'>clinical excellence</span> through <span class='gram'>longitudinal</span> <span class='b9'>skill acquisition</span>.", ch: "<span class='gram'>Given the multifaceted complexity</span> of modern <span class='b9'>workplace dynamics</span> and rigorous <span class='b9'>performance standards</span>, adaptability is paramount.", a: "<span class='gram'>While I was navigating</span> my professional objectives, <span class='gram'>never had I attained</span> such <span class='b9'>comprehensive clinical depth</span> and technical proficiency.", r: "<span class='gram'>It would be more plausible to conclude</span> that this strategic focus fosters <span class='b9'>sustained career longevity</span> and significant <span class='b9'>institutional impact</span>.", full: "The professional trajectory of my career emphasizes clinical excellence through longitudinal skill acquisition. Given the multifaceted complexity of modern workplace dynamics and rigorous performance standards, adaptability is paramount. While I was navigating my professional objectives, never had I attained such comprehensive clinical depth and technical proficiency. It would be more plausible to conclude that this strategic focus fosters sustained career longevity and significant institutional impact." },
        { t: "3. Studies & Education", f: "I <span class='b3'>study</span> hard at <span class='b3'>school</span>. It is <span class='b3'>interesting</span> to <span class='b3'>read</span> many <span class='b3'>books</span> and <span class='b3'>write</span> papers.", s: "The <span class='gram'>academic pursuit</span> of my discipline prioritizes rigorous <span class='b9'>evidence-based practice</span> and intellectual discovery.", ch: "<span class='gram'>Considering the complexity</span> of <span class='b9'>pedagogical frameworks</span> and evolving curriculum design, lifelong learning is essential.", a: "<span class='gram'>While I was engaging</span> in academic inquiry, <span class='gram'>never had I encountered</span> more challenging <span class='b9'>intellectual paradigms</span> and research methodologies.", r: "<span class='gram'>It would be more significant to conclude</span> that this rigorous approach fosters genuine <span class='b9'>professional mastery</span> and critical thinking.", full: "The academic pursuit of my discipline prioritizes rigorous evidence-based practice and intellectual discovery. Considering the complexity of pedagogical frameworks and evolving curriculum design, lifelong learning is essential. While I was engaging in academic inquiry, never had I encountered more challenging intellectual paradigms and research methodologies. It would be more significant to conclude that this rigorous approach fosters genuine professional mastery and critical thinking." },
        { t: "4. Technology", f: "I <span class='b3'>use</span> my <span class='b3'>phone</span> and <span class='b3'>computer</span> every <span class='b3'>day</span>. It is very <span class='b3'>useful</span> for my <span class='b3'>work</span>.", s: "The <span class='gram'>rapid integration</span> of advanced digital technologies fundamentally revolutionizes <span class='b9'>contemporary workflow</span> and operational efficiency.", ch: "<span class='gram'>Insofar as the complexity</span> of <span class='b9'>global connectivity</span> is concerned, digital literacy has become an indispensable requirement.", a: "<span class='gram'>While I was utilizing</span> these technological tools, <span class='gram'>never had I optimized</span> my daily tasks with such <span class='b9'>surgical precision</span>.", r: "<span class='gram'>It would be more analytical to conclude</span> that this digital transition fosters <span class='b9'>systemic innovation</span> and unprecedented productivity.", full: "The rapid integration of advanced digital technologies fundamentally revolutionizes contemporary workflow and operational efficiency. Insofar as the complexity of global connectivity is concerned, digital literacy has become an indispensable requirement. While I was utilizing these technological tools, never had I optimized my daily tasks with such surgical precision. It would be more analytical to conclude that this digital transition fosters systemic innovation and unprecedented productivity." },
        { t: "5. Health & Fitness", f: "I <span class='b3'>eat</span> good <span class='b3'>food</span> and <span class='b3'>exercise</span> in the <span class='b3'>gym</span> to stay <span class='b3'>healthy</span> and <span class='b3'>strong</span>.", s: "The <span class='gram'>prioritization</span> of personal wellness mandates a lifestyle characterized by <span class='b9'>preventative care</span> and nutritional balance.", ch: "<span class='gram'>Notwithstanding the complexity</span> of maintaining consistent <span class='b9'>physical conditioning</span>, the long-term health benefits remain undeniable.", a: "<span class='gram'>While I was training</span> consistently, <span class='gram'>never had I prioritized</span> my <span class='b9'>holistic well-being</span> with such disciplined commitment.", r: "<span class='gram'>It would be more prudent to conclude</span> that this deliberate lifestyle fosters <span class='b9'>sustained physical performance</span> and mental clarity.", full: "The prioritization of personal wellness mandates a lifestyle characterized by preventative care and nutritional balance. Notwithstanding the complexity of maintaining consistent physical conditioning, the long-term health benefits remain undeniable. While I was training consistently, never had I prioritized my holistic well-being with such disciplined commitment. It would be more prudent to conclude that this deliberate lifestyle fosters sustained physical performance and mental clarity." },
        { t: "6. Travel & Culture", f: "I <span class='b3'>travel</span> to <span class='b3'>see</span> new <span class='b3'>places</span> and <span class='b3'>learn</span> about different <span class='b3'>people</span>. It is very <span class='b3'>fun</span>.", s: "The <span class='gram'>cultural immersion</span> experience serves to significantly broaden one's <span class='b9'>global perspectives</span> and cross-cultural awareness.", ch: "<span class='gram'>Given the complexity</span> of modern <span class='b9'>cross-cultural communication</span>, travel is the most effective medium for experiential learning.", a: "<span class='gram'>While I was navigating</span> diverse social environments, <span class='gram'>never had I encountered</span> such profound <span class='b9'>cultural diversity</span> and unique traditions.", r: "<span class='gram'>It would be more insightful to conclude</span> that this immersive engagement fosters <span class='b9'>global empathy</span> and mutual understanding.", full: "The cultural immersion experience serves to significantly broaden one's global perspectives and cross-cultural awareness. Given the complexity of modern cross-cultural communication, travel is the most effective medium for experiential learning. While I was navigating diverse social environments, never had I encountered such profound cultural diversity and unique traditions. It would be more insightful to conclude that this immersive engagement fosters global empathy and mutual understanding." },
        { t: "7. Environment", f: "We must <span class='b3'>save</span> the <span class='b3'>earth</span> because <span class='b3'>pollution</span> is <span class='b3'>bad</span> for our <span class='b3'>future</span>.", s: "The <span class='gram'>strategic preservation</span> of natural habitats is crucial for long-term <span class='b9'>resource optimization</span> and ecological stability.", ch: "<span class='gram'>Considering the complexity</span> of <span class='b9'>climate action</span> and global policy, collective responsibility is the only path forward.", a: "<span class='gram'>While I was advocating</span> for sustainable practices, <span class='gram'>never had I supported</span> such impactful <span class='b9'>conservation efforts</span> and initiatives.", r: "<span class='gram'>It would be more substantiated to conclude</span> that this environmental stewardship fosters long-term <span class='b9'>viability</span> for future generations.", full: "The strategic preservation of natural habitats is crucial for long-term resource optimization and ecological stability. Considering the complexity of climate action and global policy, collective responsibility is the only path forward. While I was advocating for sustainable practices, never had I supported such impactful conservation efforts and initiatives. It would be more substantiated to conclude that this environmental stewardship fosters long-term viability for future generations." },
        { t: "8. Hobbies", f: "I <span class='b3'>like</span> my <span class='b3'>hobbies</span> because they make me <span class='b3'>happy</span> and help me <span class='b3'>relax</span>.", s: "The <span class='gram'>cultivation</span> of creative hobbies involves complex <span class='b9'>creative problem-solving</span> and continuous skill enhancement.", ch: "<span class='gram'>Reflecting on the complexity</span> of <span class='b9'>skill development</span>, the process of mastering a hobby is intrinsically rewarding.", a: "<span class='gram'>While I was dedicating</span> my leisure time to this pursuit, <span class='gram'>never had I refined</span> my capabilities with such <span class='b9'>clear intent</span>.", r: "<span class='gram'>It would be more appropriate to conclude</span> that this regular practice fosters personal <span class='b9'>growth</span> and cognitive stimulation.", full: "The cultivation of creative hobbies involves complex creative problem-solving and continuous skill enhancement. Reflecting on the complexity of skill development, the process of mastering a hobby is intrinsically rewarding. While I was dedicating my leisure time to this pursuit, never had I refined my capabilities with such clear intent. It would be more appropriate to conclude that this regular practice fosters personal growth and cognitive stimulation." },
        { t: "9. Future Goals", f: "I <span class='b3'>plan</span> to <span class='b3'>succeed</span> in the <span class='b3'>future</span> and get a better <span class='b3'>job</span> with more <span class='b3'>money</span>.", s: "The <span class='gram'>strategic formulation</span> of long-term objectives is essential for achieving sustained <span class='b9'>professional mobility</span> and success.", ch: "<span class='gram'>Notwithstanding the complexity</span> of <span class='b9'>career transitions</span> and market fluctuations, I have developed a comprehensive roadmap.", a: "<span class='gram'>While I was envisioning</span> my future goals, <span class='gram'>never had I cultivated</span> a more <span class='b9'>disciplined vision</span> for my professional advancement.", r: "<span class='gram'>It would be more strategic to conclude</span> that this proactive planning fosters long-term <span class='b9'>stability</span> and career achievement.", full: "The strategic formulation of long-term objectives is essential for achieving sustained professional mobility and success. Notwithstanding the complexity of career transitions and market fluctuations, I have developed a comprehensive roadmap. While I was envisioning my future goals, never had I cultivated a more disciplined vision for my professional advancement. It would be more strategic to conclude that this proactive planning fosters long-term stability and career achievement." },
        { t: "10. Media & News", f: "I <span class='b3'>read</span> the <span class='b3'>news</span> every <span class='b3'>day</span> to <span class='b3'>know</span> what is <span class='b3'>happening</span> in the <span class='b3'>world</span>.", s: "The <span class='gram'>critical interpretation</span> of contemporary media highlights the importance of analyzing diverse <span class='b9'>information flows</span>.", ch: "<span class='gram'>Given the complexity</span> of <span class='b9'>source verification</span> and the rise of digital misinformation, extreme vigilance is required.", a: "<span class='gram'>While I was analyzing</span> current global events, <span class='gram'>never had I evaluated</span> public discourse with such <span class='b9'>analytical precision</span>.", r: "<span class='gram'>It would be more objective to conclude</span> that this diligent consumption of media fosters greater <span class='b9'>clarity</span> and informed citizenship.", full: "The critical interpretation of contemporary media highlights the importance of analyzing diverse information flows. Given the complexity of source verification and the rise of digital misinformation, extreme vigilance is required. While I was analyzing current global events, never had I evaluated public discourse with such analytical precision. It would be more objective to conclude that this diligent consumption of media fosters greater clarity and informed citizenship." }
    ];

    let current = 0;
    
    // Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    function startDictation(id) {
        if (!SpeechRecognition) { alert("Your browser does not support voice dictation."); return; }
        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.onresult = (event) => { document.getElementById(id).value = event.results[0][0].transcript; };
        rec.start();
    }

    // TTS Setup
    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
    }

    function load() {
        document.getElementById('level-title').innerText = "Topic " + topics[current].t;
        document.getElementById('p-foundation').innerHTML = topics[current].f;
        document.getElementById('p-sit').innerHTML = topics[current].s;
        document.getElementById('p-task').innerHTML = topics[current].ch;
        document.getElementById('p-act').innerHTML = topics[current].a;
        document.getElementById('p-res').innerHTML = topics[current].r;
    }

    function nextLevel() { 
        current = (current + 1) % topics.length; 
        load(); 
        document.getElementById('review').style.display='none'; 
    }

    function evaluateDrill() {
        const rev = document.getElementById('review');
        rev.innerHTML = `<h3>Band 9 Audit Report</h3><p>${topics[current].full}</p>
                         <button onclick="speakText('${topics[current].full.replace(/'/g, "\\'")}')">🔊 Listen to Model Answer</button>`;
        rev.style.display = 'block';
    }

    load();
</script>
</body>
</html>
