<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Band 9 IELTS Engine (Voice Enabled)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .foundation { background: #fff5f5; padding: 15px; border-left: 6px solid #e74c3c; margin-bottom: 20px; font-size: 0.9em; }
        .input-group { margin: 20px 0; padding: 15px; background: #fdfdfd; border-left: 6px solid #27ae60; position: relative; }
        .anchor-text { font-size: 0.95em; color: #2c3e50; font-weight: 600; background: #f1f8e9; padding: 10px; display: block; margin-bottom: 8px; border-radius: 4px; border: 1px solid #c8e6c9; }
        textarea { width: 100%; height: 60px; border: 1px solid #bdc3c7; padding: 10px; box-sizing: border-box; }
        .b3 { color: #c0392b; font-weight: bold; } .b9 { color: #27ae60; font-weight: bold; } 
        .gram { background-color: #f1c40f; padding: 2px; border-radius: 3px; font-weight: bold; }
        .voice-btn { cursor: pointer; background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; margin-bottom: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #27ae60; color: white; border: none; margin-top: 5px; }
        #review { margin-top: 25px; padding: 20px; border: 1px solid #bdc3c7; display: none; background: #f1f2f6; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Topic 1: Hometown</h2>
    <div class="foundation"><strong>Structural Foundation (Basic):</strong> <span id="p-foundation"></span></div>
    
    <div id="drill-area">
        <div class="input-group"><label>Scene:</label><span class="anchor-text" id="p-sit"></span><button class="voice-btn" onclick="startDictation('sit')">🎤 Dictate</button><textarea id="sit"></textarea></div>
        <div class="input-group"><label>Challenge:</label><span class="anchor-text" id="p-task"></span><button class="voice-btn" onclick="startDictation('task')">🎤 Dictate</button><textarea id="task"></textarea></div>
        <div class="input-group"><label>Action:</label><span class="anchor-text" id="p-act"></span><button class="voice-btn" onclick="startDictation('act')">🎤 Dictate</button><textarea id="act"></textarea></div>
        <div class="input-group"><label>Impact:</label><span class="anchor-text" id="p-res"></span><button class="voice-btn" onclick="startDictation('res')">🎤 Dictate</button><textarea id="res"></textarea></div>
    </div>
    
    <button onclick="evaluateDrill()">Submit & Audit</button>
    <button onclick="nextLevel()">Next Competency</button>
    <div id="review"></div>
</div>

<script>
    // --- Data remains the same ---
    const topics = [
        { t: "1. Hometown", f: "My <span class='b3'>hometown</span> is <span class='b3'>growing</span>.", s: "The <span class='gram'>longitudinal urbanization</span>...", ch: "<span class='gram'>Notwithstanding</span> <span class='b9'>heritage preservation</span>...", a: "<span class='gram'>While I was</span> there...", r: "<span class='gram'>It would be more accurate</span>...", full: "The longitudinal urbanization of my hometown reflects deep demographic shifts. Notwithstanding heritage preservation efforts, it is evolving. While I was residing there, never had I witnessed such developmental momentum. It would be more accurate to conclude that this fosters community resilience." },
        /* Add other topics similarly */
    ];

    let current = 0;

    // Web Speech API: Dictation
    function startDictation(id) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.onresult = (event) => {
            document.getElementById(id).value = event.results[0][0].transcript;
        };
        recognition.start();
    }

    // Web Speech API: Text-to-Speech
    function speakText(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
    }

    function load() {
        document.getElementById('level-title').innerText = "Topic " + topics[current].t;
        document.getElementById('p-foundation').innerHTML = topics[current].f;
        document.getElementById('p-sit').innerHTML = topics[current].s;
        document.getElementById('p-task').innerHTML = topics[current].ch;
        document.getElementById('p-act').innerHTML = topics[current].a;
        document.getElementById('p-res').innerHTML = topics[current].r;
    }

    function nextLevel() { current = (current + 1) % topics.length; load(); document.getElementById('review').style.display='none'; }

    function evaluateDrill() {
        const rev = document.getElementById('review');
        rev.innerHTML = `<h3>Band 9 Audit Report</h3><p>${topics[current].full}</p>
                         <button onclick="speakText('${topics[current].full}')">🔊 Listen to Model Answer</button>`;
        rev.style.display = 'block';
    }

    load();
</script>
</body>
</html>
